services:
  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: iot_project
    ports:
      - "3309:3306"
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"

  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"

  php:
    build: ./php
    ports:
      - "8080:80"
    volumes:
      - ./php:/var/www/html
    depends_on:
      - mysql
      - mongodb
      - neo4j

  publisher-sql:
    build: ./publisher
    command: python air_qualityP.py
    depends_on:
      - mqtt

  subscriber-sql:
    build: ./subscriber
    command: python air_qualityS.py
    depends_on:
      - mqtt
      - mysql

  publisher-mongo:
    build: ./publisher
    command: python climateP.py
    depends_on:
      - mqtt

  subscriber-mongo:
    build: ./subscriber
    command: python climateS.py
    depends_on:
      - mqtt
      - mongodb

  publisher-neo4j:
    build: ./publisher
    command: python roomP.py
    depends_on:
      - mqtt

  subscriber-neo4j:
    build: ./subscriber
    command: python roomS.py
    depends_on:
      - mqtt
      - neo4j
